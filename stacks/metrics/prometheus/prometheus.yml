global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: node
    static_configs:
      - targets: ["localhost:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["localhost:8084"]

  - job_name: gluetun
    static_configs:
      - targets: ["localhost:<gluetun_metrics_port>"]