services:
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
      - VERSION=latest
    volumes:
      - /opt/appdata/plex:/config
      - /mnt/nas/data/media:/media
    devices:
      - /dev/dri:/dev/dri
    ports:
      - "32400:32400"      # main web UI / remote access
      - "1900:1900/udp"    # DLNA
      # GDM network discovery
      - "32410:32410/udp"
      - "32412:32412/udp"
      - "32413:32413/udp"
      - "32414:32414/udp"
    restart: unless-stopped
    networks: [proxy]

  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
      - DOCKER_MODS=linuxserver/mods:jellyfin-opencl-intel # optional, set to enable hardware acceleration for Intel GPUs
    volumes:
      - /opt/appdata/jellyfin:/config
      - /opt/appdata/jellyfin/cache:/cache
      - /mnt/nas/data/media:/media:ro
    devices:
      - /dev/dri:/dev/dri
    ports:
      - 8096:8096
    restart: unless-stopped
    networks: [proxy]

  sonarr-anime:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr-anime
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - /opt/appdata/sonarr/anime:/config
      - /mnt/nas/data/media/anime:/media/anime
      - /mnt/nas/data/torrents:/torrents
    ports:
      - 8989:8989
    restart: unless-stopped
    networks: [proxy]

  sonarr-tv:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr-tv
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - /opt/appdata/sonarr/tv:/config
      - /mnt/nas/data/media/tv:/media/tv
      - /mnt/nas/data/torrents:/torrents
    ports:
      - 8990:8990
    restart: unless-stopped
    networks: [proxy]

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - /opt/appdata/radarr:/config
      - /mnt/nas/data/media/movies:/media/movies
      - /mnt/nas/data/media/anime-movies:/media/anime-movies
      - /mnt/nas/data/torrents:/torrents
    ports:
      - 7878:7878
    restart: unless-stopped
    networks: [proxy]

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    container_name: seerr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
      - LOG_LEVEL=debug
    ports:
      - 5055:5055
    volumes:
      - /opt/appdata/seerr:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    restart: unless-stopped
    networks: [proxy]

  plexautolanguages:
    image: journeyover/plex-auto-languages:latest
    container_name: palang
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
      - PLEX_URL=http://192.168.1.35:32400/
    env_file:
      - .env
    volumes:
      - /opt/appdata/plexautolanguages:/config
    restart: unless-stopped

  watchstate:
    image: ghcr.io/arabcoders/watchstate:latest
    # To change the user/group id associated with the tool change the following line.
    user: "0:0"
    container_name: watchstate
    restart: unless-stopped
    ports:
        - "8082:8080"
    volumes:
        - /opt/appdata/watchstate:/config:rw
    networks: [proxy]

  agregarr:
    image: agregarr/agregarr:latest
    container_name: agregarr
    volumes:
      - /opt/appdata/agregarr/:/app/config

      # Optional: For Coming Soon/Placeholder feature
      # - /path/to/placeholder/movies:/data/movies
      # - /path/to/placeholder/tv:/data/tv

      # And then select your root folders in Settings -> Downloads
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    ports:
      - 7171:7171
    restart: unless-stopped
    networks: [proxy]

networks:
  proxy:
    external: true
