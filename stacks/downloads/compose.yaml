services:
  rdt:
    container_name: rdt
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - '/opt/appdata/rdtclient:/data/db'
      - '/mnt/nas/data/torrents:/data/downloads'
    cap_drop:
      - ALL
    image: rogerfar/rdtclient:latest
    restart: always
    logging:
      driver: json-file
      options:
        max-size: 10m
    ports:
      - '6500:6500'
    networks: [proxy]

  qbittorrent:
    cap_drop:
      - ALL
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
      - WEBUI_PORT=8083
      - TORRENTING_PORT=6881
      - DOCKER_MODS=ghcr.io/vuetorrent/vuetorrent-lsio-mod:latest  # optional, enable alternative WebUI at /vuetorrent
    volumes:
      - /opt/appdata/qbittorrent:/config
      - /mnt/nas/data/torrents:/torrents
    network_mode: "service:gluetun"
    restart: unless-stopped

  prowlarr:
    cap_drop:
      - ALL
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
      - DOTNET_SYSTEM_NET_DISABLEIPV6=1  # optional, set to 1 to disable IPv6
    volumes:
      - /opt/appdata/prowlarr:/config
    restart: unless-stopped
    network_mode: "service:gluetun"

  flaresolverr:
    cap_drop:
      - ALL
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
    restart: unless-stopped
    network_mode: "service:gluetun"

  gluetun:
    cap_add:
      - NET_ADMIN
    cap_drop:
      - ALL
    image: qmcgaw/gluetun
    container_name: gluetun
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - 8888:8888/tcp  # HTTP proxy
      - 8388:8388/tcp  # Shadowsocks
      - 8388:8388/udp  # Shadowsocks
      # Prowlarr
      - 9696:9696
      # Flaresolverr
      - 8191:8191
      # qBittorrent
      - 8083:8083  # WebUI
      - 6881:6881  # Torrenting port
      - 6881:6881/udp
    volumes:
      - /opt/appdata/gluetun:/gluetun
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    env_file:
      - .env
    networks: [proxy]

networks:
  proxy:
    external: true
