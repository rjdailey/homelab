name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      changed_stacks: ${{ steps.changed.outputs.stacks }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed stacks
        id: changed
        run: |
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            STACKS=$(ls stacks/ | tr '\n' ' ')
          else
            STACKS=$(git diff --name-only ${{ github.event.before }} HEAD \
              | grep '^stacks/' | cut -d'/' -f2 | sort -u | tr '\n' ' ')
          fi
          echo "stacks=$STACKS" >> $GITHUB_OUTPUT
          echo "Changed stacks: $STACKS"

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: |
          yamllint -d "{extends: default, rules: {line-length: {max: 120}, truthy: {allowed-values: ['true', 'false']}, document-start: disable}}" \
            stacks/

      - name: Create dummy env files
        run: |
          for stack in stacks/*/; do
            if [ -f "$stack/compose.yaml" ]; then
              touch "$stack/.env"
            fi
          done

      - name: Validate compose files
        run: |
          for stack in stacks/*/; do
            if [ -f "$stack/compose.yaml" ]; then
              echo "Validating $stack..."
              docker compose -f "$stack/compose.yaml" config --quiet
            fi
          done

      - name: Run KICS scan
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/path \
            checkmarx/kics:latest scan \
            -p /path/stacks \
            -t DockerCompose \
            --config /path/.kics.config \
            --no-progress \
            --fail-on high,critical

  deploy:
    needs: validate
    runs-on: self-hosted
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.validate.outputs.changed_stacks != ''

    steps:
      - name: Deploy changed stacks
        run: |
          for stack in ${{ needs.validate.outputs.changed_stacks }}; do
            echo "Deploying $stack..."
            curl -s -X POST http://localhost:9120/execute/DeployStack \
              -H "Content-Type: application/json" \
              -H "X-Api-Key: ${{ secrets.KOMODO_API_KEY }}" \
              -H "X-Api-Secret: ${{ secrets.KOMODO_API_SECRET }}" \
              -d "{\"stack\": \"$stack\"}" \
              | jq .
          done
