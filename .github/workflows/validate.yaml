name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: |
          yamllint -d "{extends: default, rules: {line-length: {max: 120}, truthy: {allowed-values: ['true', 'false']}, document-start: disable}}" \
            stacks/

      - name: Create dummy env files
        run: |
          for stack in stacks/*/; do
            if [ -f "$stack/compose.yaml" ]; then
              touch "$stack/.env"
            fi
          done

      - name: Validate compose files
        run: |
          for stack in stacks/*/; do
            if [ -f "$stack/compose.yaml" ]; then
              echo "Validating $stack..."
              docker compose -f "$stack/compose.yaml" config --quiet
            fi
          done

      - name: Security checks
        run: |
          echo "=== Privileged containers ==="
          grep -rn "privileged: true" stacks/ || echo "none found"

          echo "=== Host network mode ==="
          grep -rn "network_mode: host" stacks/ || echo "none found"

          echo "=== Docker socket mounts ==="
          grep -rn "docker.sock" stacks/ || echo "none found"

          echo "=== Capabilities added ==="
          grep -rn "cap_add" stacks/ || echo "none found"

          echo "=== Shell access enabled ==="
          grep -rn "ENABLE_SHELL=true" stacks/ || echo "none found"
